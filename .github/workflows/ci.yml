name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: internal_id
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d internal_id"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Verify migrations
        run: pnpm test:migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/internal_id
          APP_BASE_URL: http://localhost:3000
          BETTER_AUTH_SECRET: ci-only-better-auth-secret-32-characters

      - name: Integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/internal_id
          APP_BASE_URL: http://localhost:3000
          BETTER_AUTH_SECRET: ci-only-better-auth-secret-32-characters

      # GHSA-p2fr-6hmx-4528 (@better-auth/oauth-provider) is explicitly
      # ignored: the only fix ships in a prerelease (>=1.7.0-beta.4, no
      # stable 1.7.0 yet) whose migration does `ALTER TABLE account ADD
      # COLUMN issuer NOT NULL` with no backfill, breaking any database
      # that already has rows. Revisit once a GA release adds one.
      - name: Dependency audit
        run: pnpm dependency:audit

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: false

  admin-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/admin/pnpm-lock.yaml

      - name: Install admin dependencies
        run: pnpm admin:install --frozen-lockfile

      - name: Build
        run: pnpm admin:build

      - name: Typecheck
        run: pnpm admin:typecheck

      - name: Lint
        run: pnpm admin:lint

      - name: Unit tests
        run: pnpm admin:test
