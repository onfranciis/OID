services:
  postgres:
    image: postgres:17-alpine
    container_name: internal-id-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: internal_id
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d internal_id']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
